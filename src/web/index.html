<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FBI</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon-light-32.png" type="image/png" media="(prefers-color-scheme: light)" />
    <link rel="icon" href="/favicon-dark-32.png" type="image/png" media="(prefers-color-scheme: dark)" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="manifest" href="/manifest.json" />
    <script>
  (function(){try{var s=localStorage.getItem('fbi-theme');var m=window.matchMedia('(prefers-color-scheme: light)').matches;if(s==='light'||(s!=='dark'&&m)){document.documentElement.classList.add('light');}}catch(e){}})();
</script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
