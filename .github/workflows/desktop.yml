name: Desktop Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop

      - name: Install npm dependencies
        run: npm ci

      - name: Expose tauri CLI on PATH
        run: echo "$GITHUB_WORKSPACE/node_modules/.bin" >> $GITHUB_PATH

      - name: Build web frontend
        run: npm run build:web

      - name: Build macOS desktop app
        run: tauri build
        working-directory: desktop

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fbi-macos-${{ github.ref_name }}
          path: |
            desktop/target/release/bundle/dmg/*.dmg
            desktop/target/release/bundle/macos/*.app

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install npm dependencies
        run: npm ci

      - name: Expose tauri CLI on PATH
        run: echo "$GITHUB_WORKSPACE/node_modules/.bin" >> $GITHUB_PATH

      - name: Build web frontend
        run: npm run build:web

      - name: Build Linux desktop app
        run: tauri build
        working-directory: desktop

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fbi-linux-${{ github.ref_name }}
          path: |
            desktop/target/release/bundle/deb/*.deb
            desktop/target/release/bundle/appimage/*.AppImage
