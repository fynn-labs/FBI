name: scroll-region-stress
steps:
  - emit_ansi: "\x1b[2J\x1b[H"
  - emit_ansi: "\x1b[3;20r"
  - emit_ansi: "\x1b[1;1Hstatus line 1\x1b[K"
  - emit_ansi: "\x1b[2;1Hstatus line 2\x1b[K"
  - emit_ansi: "\x1b[3;1H"
  - emit_ansi: "scrolled line 1\r\n"
  - emit_ansi: "scrolled line 2\r\n"
  - emit_ansi: "scrolled line 3\r\n"
  - emit_ansi: "scrolled line 4\r\n"
  - emit_ansi: "scrolled line 5\r\n"
  - sleep_ms: 50
  - emit_ansi: "\x1b[r"
  - exit: 0
